<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>

</head>

<body>

<button ondblclick="myfunction()"> Style Manuplation</button> <!-- onclick HTML EVENT-->

<h1 id="test" style="color:blue;background-color:yellow">This is style given by javascript function</h1>

<hr>
<script>

	function myfunction()
	{                                       // attribute,value
		document.getElementById('test').setAttribute('style','color:red;background-color:yellow;text-transform:uppercase;text-align:center')
	}
	
</script>

</body>
