<body>

<button ondblclick="myfunction()"> Style Manuplation</button> <!-- onclick HTML EVENT-->

<h1 id="test" style="color:blue;background-color:yellow">This is style given by javascript function</h1>

<hr>

<script>
	
	function myfunction()
	{
		document.getElementById('test').style.color="pink";
		document.getElementById('test').style.backgroundColor="red";
		document.getElementById('test').style.textTransform="uppercase";
		document.getElementById('test').style.textAlign="center";
	}
</script>

</body>
