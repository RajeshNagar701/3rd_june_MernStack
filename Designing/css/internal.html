  <!-- 
    internal : we apply internal css in <style> h1 { color: red;}  </style>  
    -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
	
	<style>
		
		
		/* comment its grouping css */
		
		h1,h2,h3{color:red;background-color:yellow;text-align:center}
		
		.test1{color:green;background-color:orange;text-align:right}
		
		.underline{ text-decoration:underline}
		
		.upper{ text-transform:uppercase}
		
		#test2{color:red;background-color:pink;text-align:left}
		
		
		.mystyle{
			width:25%;
			height:200px;
			background-color:red;
			color:white;
			float:left;
		}
		
		.mystyle h4{
			font-size:20px;
			text-align:center;
		}
		
		
		
		
	</style>
   
</head>
<body>
	
    <h1>Hi i am inline css</h1>
    <h1>Hi i am inline css</h1>
    <h1>Hi i am inline css</h1>
   
    <h2>Hi i am inline css</h2>
	<h2>Hi i am inline css</h2>
	
	<h3>Hi i am inline css</h3>
	<h3>Hi i am inline css</h3>
	
	
	<p class="test1">Hi i am inline css</p>
	<p class="test1 underline upper">Hi i am inline css</p>
	<p class="test1 upper">Hi i am inline css</p>
	
	<p id="test2">Hi i am inline css</p>
	<p id="test2">Hi i am inline css</p>
	<p id="test2">Hi i am inline css</p>
	
	
	<div class="mystyle">
		<h4>Box 1</h4>
	</div>
	<div class="mystyle">
		<h4>Box 2</h4>
	</div>
	<div class="mystyle">
		<h4>Box 3</h4>
	</div>
	<div class="mystyle">
		<h4>Box 4</h4>
	</div>
	
	<h4>Box 4</h4>
</body>
</html>
